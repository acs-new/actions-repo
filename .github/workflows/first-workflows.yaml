name: first_workflow
on: [push]

jobs:
  writing-a-string:
    runs-on: ubuntu-latest
    steps:
      - name: string output
        run: echo "Hello"
      - name: multiple commands
        run: |
          node -v
          python --version

  parallel-job:
    runs-on: macos-latest
    steps:
      - name: echooes a string
        run: echo "Hello world"
      - name: error step
        run: doesnotexist

  dependant:
    runs-on: windows-latest
    steps:
      - name: string output
        run: echo "successful"